name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: go build ./...

  vocab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: install calque
        run: go install github.com/justinstimatze/calque/cmd/calque@v0.1.0
      - name: vocab drift gate
        run: calque vocab-check -exclude 'docs/internal/**' --strict
